{% extends "base_tailwind.html" %}

{% block title %}ChatMRPT{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 py-6 sm:px-6 lg:px-8 h-full flex flex-col">
    <div class="flex-1 flex flex-col bg-white dark:bg-gray-800 rounded-lg shadow-sm overflow-hidden">
        <!-- Chat Messages Area -->
        <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4">
            <!-- Messages will be loaded via HTMX -->
        </div>
        
        <!-- Chat Input Area -->
        <div class="border-t border-gray-200 dark:border-gray-700 p-4">
            <div class="flex items-end space-x-3">
                <div class="flex-1">
                    <textarea 
                        id="message-input"
                        rows="1"
                        class="block w-full rounded-md border-gray-300 dark:border-gray-700 shadow-sm focus:border-primary-500 focus:ring-primary-500 dark:bg-gray-700 dark:text-white resize-none py-2 px-3"
                        placeholder="Chat with MRPT Assistant..."
                        hx-trigger="keydown[keyCode==13 && !shiftKey] from:body"
                        hx-post="/send_message"
                        hx-include="#message-input"
                        hx-target="#chat-messages"
                        hx-swap="beforeend"
                        hx-indicator="#send-indicator"
                    ></textarea>
                </div>
                <div class="flex space-x-2">
                    <button 
                        id="upload-button"
                        class="inline-flex items-center justify-center rounded-full p-2 text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 focus:outline-none"
                        hx-get="/upload_form"
                        hx-target="#modals-container"
                        hx-swap="innerHTML"
                    >
                        <i class="fas fa-upload"></i>
                        <span class="sr-only">Upload Files</span>
                    </button>
                    <button 
                        id="download-report-btn"
                        class="inline-flex items-center justify-center rounded-full p-2 text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 focus:outline-none"
                        hx-get="/report_form"
                        hx-target="#modals-container"
                        hx-swap="innerHTML"
                    >
                        <i class="fas fa-file-alt"></i>
                        <span class="sr-only">Generate Report</span>
                    </button>
                    <button 
                        id="send-message"
                        class="inline-flex items-center justify-center rounded-full p-2 bg-primary-600 hover:bg-primary-700 text-white focus:outline-none"
                        hx-trigger="click"
                        hx-post="/send_message"
                        hx-include="#message-input"
                        hx-target="#chat-messages"
                        hx-swap="beforeend"
                        hx-indicator="#send-indicator"
                    >
                        <i class="fas fa-paper-plane"></i>
                        <span class="sr-only">Send Message</span>
                    </button>
                    <div id="send-indicator" class="htmx-indicator">
                        <div class="inline-flex items-center justify-center rounded-full p-2 bg-gray-200 dark:bg-gray-700">
                            <i class="fas fa-spinner fa-spin text-primary-600 dark:text-primary-400"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Container for modals -->
<div id="modals-container">
    <!-- Modals will be loaded here via HTMX -->
</div>

<!-- Upload File Modal Template -->
<template id="upload-modal-template">
    <div 
        id="upload-modal" 
        x-data="{ open: true }"
        x-show="open"
        x-on:keydown.escape.window="open = false"
        class="fixed inset-0 z-50 overflow-y-auto"
        aria-modal="true"
    >
        <div 
            class="flex min-h-screen items-center justify-center px-4 pt-4 pb-20 text-center"
            x-on:click="open = false"
        >
            <!-- Background overlay -->
            <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" aria-hidden="true"></div>
            
            <!-- Modal panel -->
            <div
                x-on:click.stop=""
                class="transform rounded-lg bg-white dark:bg-gray-800 px-4 pb-4 pt-5 text-left shadow-xl transition-all sm:my-8 sm:w-full sm:max-w-3xl sm:p-6"
            >
                <!-- Modal content -->
                <div class="sm:flex sm:items-start">
                    <div class="mt-3 text-center sm:ml-4 sm:mt-0 sm:text-left w-full">
                        <h3 class="text-xl font-semibold leading-6 text-gray-900 dark:text-white mb-4">
                            <i class="fas fa-cloud-upload-alt mr-2 text-primary-600 dark:text-primary-400"></i>
                            Upload Your Data
                        </h3>
                        
                        <p class="text-sm text-gray-500 dark:text-gray-400 mb-4">
                            Please provide both your CSV/Excel data and the corresponding Shapefile (ZIP).
                        </p>
                        
                        <form
                            id="upload-form"
                            hx-encoding="multipart/form-data"
                            hx-post="/upload_both_files"
                            hx-target="#upload-status"
                            hx-swap="innerHTML"
                            hx-indicator="#upload-indicator"
                        >
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                                <div class="border border-gray-200 dark:border-gray-700 rounded-lg p-4">
                                    <h5 class="font-medium mb-2">
                                        <i class="fas fa-file-csv text-green-600 dark:text-green-500 mr-2"></i>
                                        CSV / Excel Data
                                    </h5>
                                    <p class="text-sm text-gray-500 dark:text-gray-400 mb-2">
                                        Ward-level data (e.g., environmental factors, demographics).
                                    </p>
                                    <input
                                        type="file"
                                        name="csv_file"
                                        id="csv-upload"
                                        accept=".csv,.xlsx,.xls"
                                        class="block w-full text-sm text-gray-500 dark:text-gray-400
                                              file:mr-4 file:py-2 file:px-4
                                              file:rounded-md file:border-0
                                              file:text-sm file:font-medium
                                              file:bg-primary-50 file:text-primary-700
                                              dark:file:bg-primary-900 dark:file:text-primary-300
                                              hover:file:bg-primary-100 dark:hover:file:bg-primary-800"
                                    >
                                </div>
                                
                                <div class="border border-gray-200 dark:border-gray-700 rounded-lg p-4">
                                    <h5 class="font-medium mb-2">
                                        <i class="fas fa-map-marked-alt text-blue-600 dark:text-blue-500 mr-2"></i>
                                        Shapefile (ZIP)
                                    </h5>
                                    <p class="text-sm text-gray-500 dark:text-gray-400 mb-2">
                                        Geographical boundaries of wards (must be a .zip archive).
                                    </p>
                                    <input
                                        type="file"
                                        name="shapefile"
                                        id="shapefile-upload"
                                        accept=".zip"
                                        class="block w-full text-sm text-gray-500 dark:text-gray-400
                                              file:mr-4 file:py-2 file:px-4
                                              file:rounded-md file:border-0
                                              file:text-sm file:font-medium
                                              file:bg-primary-50 file:text-primary-700
                                              dark:file:bg-primary-900 dark:file:text-primary-300
                                              hover:file:bg-primary-100 dark:hover:file:bg-primary-800"
                                    >
                                </div>
                            </div>
                            
                            <div class="mb-4">
                                <button
                                    type="submit"
                                    class="w-full flex justify-center items-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-primary-600 hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500"
                                >
                                    <i class="fas fa-upload mr-2"></i>
                                    Upload Files
                                </button>
                                
                                <div id="upload-indicator" class="htmx-indicator flex justify-center mt-2">
                                    <div class="inline-flex items-center px-4 py-2 font-semibold leading-6 text-sm rounded-md text-primary-800 bg-primary-100 dark:text-primary-200 dark:bg-primary-900">
                                        <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-primary-600 dark:text-primary-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                        </svg>
                                        Uploading...
                                    </div>
                                </div>
                                
                                <div id="upload-status" class="mt-2">
                                    <!-- Upload status messages will appear here -->
                                </div>
                            </div>
                            
                            <div class="mt-4 border-t border-gray-200 dark:border-gray-700 pt-4 text-center">
                                <p class="text-sm text-gray-500 dark:text-gray-400 mb-2">
                                    Alternatively, explore the tool's capabilities with our sample dataset:
                                </p>
                                <button
                                    type="button"
                                    id="use-sample-data-btn-modal"
                                    class="inline-flex items-center justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-primary-700 bg-primary-100 hover:bg-primary-200 dark:text-primary-300 dark:bg-primary-900 dark:hover:bg-primary-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500"
                                    hx-post="/load_sample_data"
                                    hx-target="#chat-messages"
                                    hx-swap="beforeend"
                                    hx-indicator="#sample-data-indicator"
                                >
                                    <i class="fas fa-database mr-2"></i>
                                    Load Sample Data
                                </button>
                                <div id="sample-data-indicator" class="htmx-indicator flex justify-center mt-2">
                                    <div class="inline-flex items-center px-4 py-2 font-semibold leading-6 text-sm rounded-md text-primary-800 bg-primary-100 dark:text-primary-200 dark:bg-primary-900">
                                        <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-primary-600 dark:text-primary-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                        </svg>
                                        Loading sample data...
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
                
                <div class="mt-5 sm:mt-4 sm:flex sm:flex-row-reverse">
                    <button
                        type="button"
                        x-on:click="open = false"
                        class="mt-3 inline-flex w-full justify-center rounded-md bg-white dark:bg-gray-700 px-3 py-2 text-sm font-semibold text-gray-900 dark:text-gray-200 shadow-sm ring-1 ring-inset ring-gray-300 dark:ring-gray-600 hover:bg-gray-50 dark:hover:bg-gray-600 sm:mt-0 sm:w-auto"
                    >
                        Close
                    </button>
                </div>
            </div>
        </div>
    </div>
</template>

<!-- Report Generation Modal Template -->
<template id="report-modal-template">
    <div 
        id="report-modal" 
        x-data="{ open: true }"
        x-show="open"
        x-on:keydown.escape.window="open = false"
        class="fixed inset-0 z-50 overflow-y-auto"
        aria-modal="true"
    >
        <div 
            class="flex min-h-screen items-center justify-center px-4 pt-4 pb-20 text-center"
            x-on:click="open = false"
        >
            <!-- Background overlay -->
            <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" aria-hidden="true"></div>
            
            <!-- Modal panel -->
            <div
                x-on:click.stop=""
                class="transform rounded-lg bg-white dark:bg-gray-800 px-4 pb-4 pt-5 text-left shadow-xl transition-all sm:my-8 sm:w-full sm:max-w-lg sm:p-6"
            >
                <!-- Modal content -->
                <div class="sm:flex sm:items-start">
                    <div class="mt-3 text-center sm:ml-4 sm:mt-0 sm:text-left w-full">
                        <h3 class="text-xl font-semibold leading-6 text-gray-900 dark:text-white mb-4">
                            <i class="fas fa-file-invoice mr-2 text-primary-600 dark:text-primary-400"></i>
                            Generate Analysis Report
                        </h3>
                        
                        <form
                            id="report-form"
                            hx-post="/generate_report"
                            hx-target="#report-status"
                            hx-swap="innerHTML"
                            hx-indicator="#report-indicator"
                        >
                            <div class="mb-4">
                                <label for="report-format" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                                    Select Report Format:
                                </label>
                                <select
                                    id="report-format"
                                    name="report_format"
                                    class="block w-full rounded-md border-gray-300 dark:border-gray-700 shadow-sm focus:border-primary-500 focus:ring-primary-500 dark:bg-gray-700 dark:text-white py-2 px-3"
                                >
                                    <option value="pdf" selected>PDF Document</option>
                                    <option value="html">HTML Web Page</option>
                                    <option value="markdown">Markdown (.md)</option>
                                </select>
                            </div>
                            
                            <div class="mb-4 bg-gray-50 dark:bg-gray-900 p-4 rounded-md">
                                <h4 class="text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Report Contents:</h4>
                                <ul class="text-xs text-gray-500 dark:text-gray-400 ml-5 list-disc">
                                    <li>Data Overview & Methodology Summary</li>
                                    <li>Missing Value Handling Details</li>
                                    <li>Variable Relationship Analysis</li>
                                    <li>Composite Score Calculation Insights</li>
                                    <li>Ward Vulnerability Rankings & Prioritization</li>
                                    <li>Urban Extent Analysis Findings</li>
                                </ul>
                            </div>
                            
                            <div class="mb-4">
                                <button
                                    type="submit"
                                    class="w-full flex justify-center items-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-primary-600 hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500"
                                >
                                    <i class="fas fa-cogs mr-2"></i>
                                    Generate Report
                                </button>
                                
                                <div id="report-indicator" class="htmx-indicator flex justify-center mt-2">
                                    <div class="inline-flex items-center px-4 py-2 font-semibold leading-6 text-sm rounded-md text-primary-800 bg-primary-100 dark:text-primary-200 dark:bg-primary-900">
                                        <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-primary-600 dark:text-primary-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                        </svg>
                                        Generating report...
                                    </div>
                                </div>
                                
                                <div id="report-status" class="mt-2">
                                    <!-- Report generation status messages will appear here -->
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
                
                <div class="mt-5 sm:mt-4 sm:flex sm:flex-row-reverse">
                    <button
                        type="button"
                        x-on:click="open = false"
                        class="mt-3 inline-flex w-full justify-center rounded-md bg-white dark:bg-gray-700 px-3 py-2 text-sm font-semibold text-gray-900 dark:text-gray-200 shadow-sm ring-1 ring-inset ring-gray-300 dark:ring-gray-600 hover:bg-gray-50 dark:hover:bg-gray-600 sm:mt-0 sm:w-auto"
                    >
                        Cancel
                    </button>
                </div>
            </div>
        </div>
    </div>
</template>

<!-- Visualization Modal Template -->
<template id="visualization-modal-template">
    <div 
        id="visualization-modal" 
        x-data="{ open: true }"
        x-show="open"
        x-on:keydown.escape.window="open = false"
        class="fixed inset-0 z-50 overflow-y-auto"
        aria-modal="true"
    >
        <div 
            class="flex min-h-screen items-center justify-center px-4 pt-4 pb-20 text-center"
            x-on:click="open = false"
        >
            <!-- Background overlay -->
            <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" aria-hidden="true"></div>
            
            <!-- Modal panel -->
            <div
                x-on:click.stop=""
                class="transform rounded-lg bg-white dark:bg-gray-800 px-4 pb-4 pt-5 text-left shadow-xl transition-all sm:my-8 w-full max-w-7xl h-[80vh]"
            >
                <!-- Modal header -->
                <div class="flex justify-between items-center mb-4">
                    <h3 id="visualization-title" class="text-xl font-semibold leading-6 text-gray-900 dark:text-white">
                        Visualization
                    </h3>
                    <button
                        type="button"
                        x-on:click="open = false"
                        class="text-gray-400 hover:text-gray-500 focus:outline-none"
                    >
                        <span class="sr-only">Close</span>
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                
                <!-- Modal content -->
                <div 
                    id="visualization-content"
                    class="h-[calc(80vh-4rem)] overflow-y-auto flex justify-center items-center"
                >
                    <!-- Visualization content will be loaded here -->
                </div>
            </div>
        </div>
    </div>
</template>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Auto-resize textarea as user types
        const messageInput = document.getElementById('message-input');
        if (messageInput) {
            messageInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = (this.scrollHeight) + 'px';
            });
        }
        
        // Initialize with welcome message if chat is empty
        const chatMessages = document.getElementById('chat-messages');
        if (chatMessages && chatMessages.children.length === 0) {
            // Add a static welcome message instead of using HTMX
            chatMessages.innerHTML = `
            <div class="chat-message system-message">
                <div class="flex items-start">
                    <div class="flex-shrink-0 mr-3">
                        <div class="h-8 w-8 rounded-full bg-gray-600 dark:bg-gray-700 flex items-center justify-center text-white">
                            <i class="fas fa-robot"></i>
                        </div>
                    </div>
                    <div class="flex-1 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg px-4 py-2 shadow-sm">
                        <div class="text-gray-800 dark:text-gray-100 prose prose-sm dark:prose-invert max-w-none">
                            <h4 class="text-lg font-medium mb-2">Welcome to the Malaria Risk Prioritization Tool!</h4>
                            <p>I'm your AI assistant for analyzing malaria risk factors and prioritizing areas for intervention. Here's how I can help you:</p>
                            <ul class="mt-2 space-y-1 list-disc list-inside text-sm">
                                <li>Upload your CSV/Excel data and Shapefile to analyze location-specific risks</li>
                                <li>Explore variables and their relationships to malaria incidence</li>
                                <li>Generate visualizations of risk patterns and distributions</li>
                                <li>Create prioritization maps for targeted interventions</li>
                                <li>Generate detailed analysis reports for planning purposes</li>
                            </ul>
                            <p class="mt-2">You can start by uploading your data or using our sample dataset to explore the capabilities.</p>
                        </div>
                        <div class="mt-4 flex justify-center space-x-2">
                            <button
                                id="upload-data-btn"
                                class="inline-flex items-center justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-primary-600 hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500"
                                onclick="document.getElementById('upload-button').click()"
                            >
                                <i class="fas fa-upload mr-2"></i>
                                Upload Data
                            </button>
                            <button
                                id="use-sample-data-btn"
                                class="inline-flex items-center justify-center py-2 px-4 border border-gray-300 dark:border-gray-600 text-sm font-medium rounded-md text-gray-700 dark:text-gray-200 bg-white dark:bg-gray-700 hover:bg-gray-50 dark:hover:bg-gray-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500"
                                hx-post="/load_sample_data"
                                hx-target="#chat-messages"
                                hx-swap="beforeend"
                                hx-indicator="#sample-data-indicator"
                            >
                                <i class="fas fa-vial mr-2"></i>
                                Use Sample Data
                            </button>
                            <div id="sample-data-indicator" class="htmx-indicator">
                                <div class="inline-flex items-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-primary-800 bg-primary-100 dark:text-primary-200 dark:bg-primary-900">
                                    <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-primary-600 dark:text-primary-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                    </svg>
                                    Loading...
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            `;
        }

        // Handle upload button click
        document.getElementById('upload-button').addEventListener('click', function() {
            const template = document.getElementById('upload-modal-template');
            const clone = document.importNode(template.content, true);
            document.getElementById('modals-container').innerHTML = '';
            document.getElementById('modals-container').appendChild(clone);
        });

        // Handle report button click
        document.getElementById('download-report-btn').addEventListener('click', function() {
            const template = document.getElementById('report-modal-template');
            const clone = document.importNode(template.content, true);
            document.getElementById('modals-container').innerHTML = '';
            document.getElementById('modals-container').appendChild(clone);
        });
    });
</script>
{% endblock %}
