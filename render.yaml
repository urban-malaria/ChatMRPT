services:
  - type: web
    name: chatmrpt
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn 'run:app' --bind=0.0.0.0:$PORT
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
    disk:
      name: data
      mountPath: /app/instance
      sizeGB: 1
    plan: free
    autoDeploy: true
    healthCheckPath: /
    domains:
      - chatmrpt.onrender.com

databases:
  - name: chatmrpt-db
    plan: free
    databaseName: chatmrpt
    user: chatmrpt_user 